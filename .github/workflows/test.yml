name: Tests

on: [push, pull_request]

jobs:

  run_tests:
    name:  Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set git configuration
        shell: bash
        run: |
          git config --global user.name github-actions
          git config --global user.email github-actions@github.com

      - name: Run Tests
        # The suite bakes the template and runs each generated project's
        # `make test`/`make docs`/`make dist`; uv downloads the required
        # interpreters (3.10-3.14) on demand.
        run: make test
